<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}דוחות שיווק{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Heebo', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Heebo', sans-serif; }
    [contenteditable]:focus { outline: 2px solid #6366f1; border-radius: 4px; }
    .block-item:hover .block-controls { opacity: 1; }
    .block-controls { opacity: 0; transition: opacity 0.15s; }
    .drag-handle { cursor: grab; }
    .drag-handle:active { cursor: grabbing; }
    .sortable-ghost { opacity: 0.4; background: #e0e7ff; border-radius: 8px; }
    @media print {
      nav, .no-print { display: none !important; }
      body { background: white; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

{% if not embed %}
<nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-14">
    <a href="{{ url_for('index') }}" class="flex items-center gap-2 font-bold text-lg text-indigo-600">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      ReportAI
    </a>
    <div class="flex items-center gap-1">
      <a href="{{ url_for('index') }}" class="px-3 py-1.5 text-sm rounded-lg hover:bg-gray-100 {% if request.endpoint == 'index' %}bg-indigo-50 text-indigo-600 font-medium{% endif %}">לוח בקרה</a>
      <a href="{{ url_for('clients_list') }}" class="px-3 py-1.5 text-sm rounded-lg hover:bg-gray-100 {% if 'client' in request.endpoint %}bg-indigo-50 text-indigo-600 font-medium{% endif %}">לקוחות</a>
      <a href="{{ url_for('reports_list') }}" class="px-3 py-1.5 text-sm rounded-lg hover:bg-gray-100 {% if 'report' in request.endpoint %}bg-indigo-50 text-indigo-600 font-medium{% endif %}">דוחות</a>
      <a href="{{ url_for('reports_new') }}" class="mr-2 px-4 py-1.5 text-sm rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 font-medium">+ דוח חדש</a>
    </div>
  </div>
</nav>
{% endif %}

<main class="{% if not embed %}max-w-6xl mx-auto px-4 py-6{% endif %}">
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
